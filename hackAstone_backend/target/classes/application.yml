server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: hackAstone-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 确保你的数据库 hackastone 已经存在
    url: jdbc:mysql://localhost:3306/hackastone?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456

mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: org.hackastone.base.dal.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    org.hackastone: debug

bailian:
  # 建议通过环境变量注入，不要把 key 写入仓库
  api-key: ${BAILIAN_API_KEY:}
  endpoint: ${BAILIAN_ENDPOINT:https://dashscope.aliyuncs.com/api/v1/apps}
  timeout-ms: ${BAILIAN_TIMEOUT_MS:60000}
  cache-ttl-ms: ${BAILIAN_CACHE_TTL_MS:60000}
  atlas-app-id: ${BAILIAN_ATLAS_APP_ID:}
  nova-app-id: ${BAILIAN_NOVA_APP_ID:}
  forge-app-id: ${BAILIAN_FORGE_APP_ID:}
  ledger-app-id: ${BAILIAN_LEDGER_APP_ID:}
  echo-app-id: ${BAILIAN_ECHO_APP_ID:}
  sentinel-app-id: ${BAILIAN_SENTINEL_APP_ID:}
