server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/api}

spring:
  application:
    name: hackAstone-backend
  config:
    import: optional:file:./.env[.properties]
  datasource:
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hackastone?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}

mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: org.hackastone.base.dal.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    org.hackastone: ${APP_LOG_LEVEL:debug}

bailian:
  api-key: ${BAILIAN_API_KEY:}
  endpoint: ${BAILIAN_ENDPOINT:https://dashscope.aliyuncs.com/api/v1/apps}
  timeout-ms: ${BAILIAN_TIMEOUT_MS:60000}
  cache-ttl-ms: ${BAILIAN_CACHE_TTL_MS:60000}
  atlas-app-id: ${BAILIAN_ATLAS_APP_ID:}
  nova-app-id: ${BAILIAN_NOVA_APP_ID:}
  forge-app-id: ${BAILIAN_FORGE_APP_ID:}
  ledger-app-id: ${BAILIAN_LEDGER_APP_ID:}
  echo-app-id: ${BAILIAN_ECHO_APP_ID:}
  sentinel-app-id: ${BAILIAN_SENTINEL_APP_ID:}
